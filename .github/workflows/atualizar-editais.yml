name: Atualizar Editais de Pos-Graduacao Bahia

on:
  schedule:
    # Agenda a execucao diaria a meia-noite (00:00 UTC)
    - cron: '0 0 * * *'
  workflow_dispatch: # Permite execucao manual pelo botao do GitHub Actions

permissions:
  contents: write # Permite que o bot comite as atualizacoes no repositorio

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout do Repositorio
      uses: actions/checkout@v4

    - name: Configurar Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24' # Node.js 24 com suporte nativo total e moderno

    - name: Executar Compilador de Editais
      run: node compilador.js

    - name: Comitar e Enviar Atualizacoes para o GitHub
      run: |
        git config --global user.name "GitHub Action Bot"
        git config --global user.email "actions@github.com"
        git add -A
        git diff-index --quiet HEAD || git commit -m "chore: atualizacao periodica de editais e metricas [skip ci]"
        git push origin main
